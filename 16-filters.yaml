- name: filters in ansible
  hosts: local
  connection: local
  vars:
    Topics: Linux, Ansible, Terraform, Docker, Kubernetes
    Details:
      name: "Ashish"
      Domian: "Devops"
      Branch: "CSE"
      Pursuing: "B.Tech"
  tasks:
    - name: ansible filters
      ansible.builtin.debug:
       msg: "Congratulations  {{ Greeting | default('Ashish')  }}"
      
    - name: Split the string  into a list
      ansible.builtin.debug:
       msg: "Topics are {{ Topics | split(',') }}"

    - name: Convert Map to list
      ansible.builtin.debug:
       msg: "Details are {{ Details | dict2items }}"
